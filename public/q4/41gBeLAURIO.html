<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Q3 2nd Graded Exercise">
    <meta name="keywords" content="HTML Forms">
    <meta name="author" content="Sav Laurio">
    <title>Sample Form</title>

    <link rel="stylesheet" href="q4ge1.css">
    <script src="q4ge1.js" defer></script>
</head>

<body>
   <section>

      <form id="movieForm" method="get" class="movieForm">
        <legend><h1>Add a Movie</h1></legend>
        <fieldset>
            <label> Movie Title: </label>
                <input type="text" name="movieTitle" id="movieTitle" required /><br/><br/>
            <label> Year: </label>
                <input type="text" name="year" id="year" required /><br/><br/>

            <label> Genre: </label>
                <select name="genre" id="genre" required >
                    <option value="" disabled selected> Choose a genre</option>
                    <option value="Action">Action</option>
                    <option value="Comedy">Comedy</option>
                    <option value="Drama">Drama</option>
                    <option value="Horror">Horror</option>
                    <option value="Sci-fi">Sci-fi</option>
                    <option value="Romance">Romance</option>
                    <option value="historical">Historical</option>
                </select><br/><br/>
   
            <label> Rating:  </label>
            <div class="stars" id="rating">
                <span class="star" value="1">&#9733;</span>
                <span class="star" value="2">&#9733;</span>
                <span class="star" value="3">&#9733;</span>
                <span class="star" value="4">&#9733;</span>
                <span class="star" value="5">&#9733;</span>
            </div>
        </fieldset>

        <button type="submit">Add movie</button>
        <button type="reset">Delete</button>
        </form>
    </section>

    <section>
        <h2>Movie List</h2>
        <div id="movieListContainer" class="movieCont"></div>
        
    </section>
</body>
</html>
