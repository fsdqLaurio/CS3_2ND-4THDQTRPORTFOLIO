<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Q3 2nd Graded Exercise">
    <meta name="keywords" content="HTML Forms">
    <meta name="author" content="Sav Laurio">
    <title>Sample Form</title>

    <link rel="stylesheet" href="q4ge1.css">
    <script src="q4ge1.js" defer></script>
</head>

<body>
    <nav class ="navbar">
        <a href="../../index.html">Home</a>
        <a href="">Show Saved Accounts</a>
    </nav>

    <section>
    <h1 class="title">Sign-up Page</h1>

      <form id="dForm" method="get">
        <fieldset>
            <legend>Add a Movie</legend>
            <label> Movie Title: 
                <input onfocus="changeColor(this)" onblur="resetColor(this)" type="text" name="movieTitle" id="movieTitle" required />
            </label><br/><br/>
            <label> Year:
                <input onfocus="changeColor(this)" onblur="resetColor(this)" type="text" name="year" id="year" required />
            </label>

            <label> Genre:
                <select name="genre" id="genre" required >
                    <option value="" disabled selected> Choose a genre</option>
                    <option value="action">Action</option>
                    <option value="comedy">Comedy</option>
                    <option value="drama">Drama</option>
                    <option value="horror">Horror</option>
                    <option value="sci-fi">Sci-fi</option>
                    <option value="romance">Romance</option>
                    <option value="historical">Historical</option>
                </select>
            </label><br/><br/>

            <div id="rating">
                <label> Rating:
                    <input type="radio" name="rating" id="rat5" value="5" required/>
                    <input type="radio" name="rating" id="rat4" value="4" required/>
                    <input type="radio" name="rating" id="rat3" value="3" required/>
                    <input type="radio" name="rating" id="rat2" value="2" required/>
                    <input type="radio" name="rating" id="rat1" value="1" required/>
                </label>
            </div>
            </label>
        </fieldset>

        <button type="submit">Submit</button>
        </form>
    </section>
</body>
</html>
